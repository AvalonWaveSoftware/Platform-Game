<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avalon Standalone Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div>
        <h1>Avalon Standalone Game</h1>
        <p>Reach the goal on the final level to win.</p>
      </div>

      <div id="hud">
        <div><strong>Level:</strong> <span id="levelLabel">1 / 1</span></div>
        <div><strong>Coins left:</strong> <span id="coinCount">0</span></div>
        <div><strong>Time:</strong> <span id="timerLabel">00:00.000</span></div>
        <div><strong>Status:</strong> <span id="statusText">Ready</span></div>
      </div>
    </header>

    <main id="game-shell">
      <canvas id="game" width="960" height="540"></canvas>
    </main>

    <footer id="controls">
      <p>
        Move with <strong>WASD</strong> or <strong>Arrow Keys</strong>. 
        Jump with <strong>Space</strong>, <strong>W</strong>, or <strong>Up Arrow</strong>.
        Timer starts when you first move.
      </p>
    </footer>
  </div>

  <script src="engine.js"></script>
  <script src="levels.js"></script>
  <script src="game.js"></script>
</body>
</html>
